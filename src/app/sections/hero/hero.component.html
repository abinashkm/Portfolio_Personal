<section class="hero" id="home">
  <div class="hero-inner">

    <div class="hero-left">

      <div class="hero-badge">
        FULL-STACK ENGINEER · 1.4 YEARS EXPERIENCE
      </div>

      <h1>
        Hi, I’m Abinash
        <span>Full-stack Software Engineer</span>
      </h1>

      <div class="tech-stack">
        Java · Spring Boot · Angular · REST APIs · Testing
      </div>

      <p class="hero-description">
        Building scalable full-stack systems with Angular, Spring Boot,
        and performance-focused engineering.
      </p>

      <div class="hero-actions">

        <button class="secondary-button" (click)="openResume()">
          View Resume
        </button>

        <button class="primary-button" (click)="openGitHub()">
          GitHub
        </button>

        <button class="primary-button" (click)="openLinkedIn()">
          LinkedIn
        </button>

      </div>

    </div>

  </div>
</section>
